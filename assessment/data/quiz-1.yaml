# Checkpoint quiz 1 — authored from domains/1-identity-governance/ notes (OSS-500 Domain 1).
# Schema mirrors study-hub quiz shape. Answers are ZERO-BASED indexes into options.
id: quiz-1
title: "Checkpoint 1 — Identity, access, and governance"
domain: d1
passPercent: 80
questions:
  - id: q1-01
    objectiveIds: [kc-deploy]
    type: single
    stem: >-
      A teammate stood up Keycloak with `kc.sh start-dev`, created users in the
      built-in master realm, and pointed the production web app at it. After a
      pod restart all users vanished and tokens are now rejected. Which two root
      causes best explain this, and what is the correct production setup?
    options:
      - "Keycloak requires a paid license for persistence; buy the enterprise tier"
      - "start-dev uses the ephemeral H2 database (state lost on restart) and workloads were modelled in the master realm; run `start` with Postgres, a fixed hostname/issuer, and a dedicated application realm"
      - "The master realm cannot hold users; move them to a client scope"
      - "Tokens were rejected because MFA was not enabled on the realm"
    answer: [1]
    explanation: >-
      `start-dev` uses the in-memory/H2 dev database and disables HTTPS/hostname
      checks, so state is lost on restart and the issuer is unstable. The master
      realm is for administering other realms — application identities belong in
      a dedicated realm (the Entra-tenant analogue). Production needs `kc.sh
      start` with Postgres and a fixed hostname so the issuer in every token
      stays stable.
    docUrl: "https://www.keycloak.org/server/configuration-production"
  - id: q1-02
    objectiveIds: [kc-deploy]
    type: single
    stem: >-
      You are modelling identities in Keycloak to mirror an Entra tenant. A
      permission is specific to one application (the reports API) and should not
      appear on unrelated apps. Which construct fits, and what is its Entra
      analogue?
    options:
      - "A realm role — the analogue of an Entra directory role"
      - "A client role on the reports-api client — the analogue of an Entra app role"
      - "A default client scope applied to every client"
      - "A group in the master realm"
    answer: [1]
    explanation: >-
      Client roles are scoped to a single client, the Keycloak equivalent of an
      Entra app role; realm roles are tenant-wide (directory-role analogue).
      Putting an app-specific permission in a realm role over-broadens it, and
      the master realm is admin-only.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#assigning-permissions-using-roles-and-groups"
  - id: q1-03
    objectiveIds: [kc-mfa]
    type: single
    stem: >-
      You enabled the OTP authentication method in the Keycloak realm, but users
      still sign in with a password only and are never prompted for a second
      factor. What is missing?
    options:
      - "Users must each buy a hardware token before OTP works"
      - "An OTP execution must be added to the bound browser flow as REQUIRED (or CONDITIONAL); enabling the method only makes it available, it does not enforce it"
      - "OTP only works if the realm is switched to passwordless mode"
      - "The realm needs a paid MFA add-on"
    answer: [1]
    explanation: >-
      MFA is enforced in the authentication flow, not by enabling the method.
      The second factor is required only when an OTP/WebAuthn execution is
      REQUIRED or CONDITIONAL in the bound browser flow — exactly the Entra
      distinction between a registered method and a Conditional Access policy
      that requires it.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#configuring-authentication"
  - id: q1-04
    objectiveIds: [kc-mfa]
    type: multi
    stem: >-
      Security mandates phishing-resistant authentication for realm
      administrators in Keycloak. Which options satisfy that requirement?
      (Select two)
    options:
      - "TOTP one-time passwords from an authenticator app"
      - "WebAuthn passwordless with a FIDO2 security key / passkey"
      - "WebAuthn two-factor with a platform authenticator after a password"
      - "SMS one-time passcodes"
    answer: [1, 2]
    explanation: >-
      FIDO2/WebAuthn (passwordless or two-factor) is origin-bound and
      phishing-resistant. TOTP and SMS are MFA but remain phishable via
      attacker-in-the-middle relay — the same reason Entra treats passkeys /
      Windows Hello as phishing-resistant and OTP/SMS as not.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#_webauthn"
  - id: q1-05
    objectiveIds: [kc-ca]
    type: single
    stem: >-
      You want users with the `admins` role to be forced through MFA at login,
      while regular users are not. In Keycloak, how do you build this
      conditional-access behaviour?
    options:
      - "Set a global realm toggle 'require MFA for all'"
      - "Add a CONDITIONAL subflow whose condition is 'user has role admins' containing a REQUIRED OTP/WebAuthn execution"
      - "Create an Authorization Services time-based policy"
      - "Enable Consent Required on every client"
    answer: [1]
    explanation: >-
      Step-up MFA is a CONDITIONAL subflow keyed on a role condition with a
      REQUIRED second-factor execution — the flow-level (login-time) decision,
      the shape of an Entra CA policy scoped to a role group requiring MFA. A
      global toggle would hit everyone; Authorization Services governs
      per-resource access, not login-time step-up.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#_conditional-flows"
  - id: q1-06
    objectiveIds: [kc-ca]
    type: single
    stem: >-
      A client uses Keycloak Authorization Services. A resource `/reports` has a
      `view` permission bound to a role policy, but no permission references the
      `export` scope. A user with every role calls `export`. What happens and
      why?
    options:
      - "Allowed — users with all roles bypass Authorization Services"
      - "Denied — Authorization Services is deny-by-default; a scope with no matching permission is not granted"
      - "Allowed — undefined scopes default to permit"
      - "Denied — only because the user lacks the view permission"
    answer: [1]
    explanation: >-
      Authorization Services evaluates deny-by-default: a request for a scope
      with no permission granting it is denied regardless of the caller's roles.
      This is the per-resource, per-scope authorization layer (distinct from the
      login-time flow decision).
    docUrl: "https://www.keycloak.org/docs/latest/authorization_services/index.html"
  - id: q1-07
    objectiveIds: [kc-clients]
    type: single
    stem: >-
      A single-page application (SPA) running entirely in the browser needs to
      authenticate users against Keycloak. How should its client be configured?
    options:
      - "Confidential client with a client secret embedded in the JavaScript bundle"
      - "Public client using the authorization code flow with PKCE and no client secret"
      - "Bearer-only client"
      - "A service account using the client-credentials grant"
    answer: [1]
    explanation: >-
      A browser SPA cannot keep a secret, so it must be a public client using
      authorization code with PKCE — never a confidential client with an
      embedded secret. Bearer-only is for APIs that only validate tokens;
      client-credentials is for daemon (no-user) identities.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#_oidc_clients"
  - id: q1-08
    objectiveIds: [kc-clients]
    type: single
    stem: >-
      A nightly batch job with no interactive user must authenticate to an API
      as itself. In Keycloak, what gives the job an identity and which grant
      does it use?
    options:
      - "A public client with the implicit flow"
      - "A confidential client with Service Accounts enabled, using the client-credentials grant; roles are granted to its service-account user"
      - "The resource-owner password grant with a shared service password"
      - "A bearer-only client with direct access grants"
    answer: [1]
    explanation: >-
      Enabling Service Accounts on a confidential client creates a hidden
      service-account user and the client-credentials grant, so the app
      authenticates as itself with no human present — the Keycloak equivalent of
      an Entra application (daemon) identity / managed identity. Its permissions
      come from role mappings on the service-account user.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#_service_accounts"
  - id: q1-09
    objectiveIds: [kc-federation]
    type: single
    stem: >-
      Partner-company users must sign in to your app using their own Entra
      tenant, but your app should keep trusting only one issuer (your Keycloak).
      Which Keycloak capability fits, and how is it different from user
      federation?
    options:
      - "User federation via LDAP — import the partner's directory"
      - "Identity brokering — add the partner as an OIDC/SAML identity provider; Keycloak delegates authentication upstream but still issues its own tokens. User federation instead imports an external user store (LDAP/Kerberos)"
      - "Create local accounts for every partner user"
      - "Enable Consent Required on the partner client"
    answer: [1]
    explanation: >-
      Delegating login to an external IdP while issuing your own tokens is
      identity brokering (the Entra B2B/federation analogue). User federation is
      a different feature that imports an LDAP/Kerberos user store. The First
      Login Flow and IdP mappers control account linking and claim mapping.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#_identity_broker"
  - id: q1-10
    objectiveIds: [kc-consent]
    type: single
    stem: >-
      After a consent-phishing incident, users had granted a malicious
      third-party Keycloak client broad scopes. What is the correct hardening
      and remediation posture?
    options:
      - "Disable all clients permanently"
      - "Require consent (Consent Required) for third-party clients, keep client scopes least-privilege (avoid stuffing Default scopes), and revoke the recorded consent grants"
      - "Move every scope into Default client scopes so nothing is requested at runtime"
      - "Turn on implicit flow so tokens expire faster"
    answer: [1]
    explanation: >-
      The illicit-consent playbook mirrors Entra: require consent for
      non-first-party clients, keep scopes least-privilege, and revoke the
      recorded grants (visible/revocable in the Account Console or by an admin).
      Stuffing Default scopes over-broadens every token; implicit flow is
      unrelated and legacy.
    docUrl: "https://www.keycloak.org/docs/latest/server_admin/index.html#_consent"
  - id: q1-11
    objectiveIds: [wi-sa]
    type: single
    stem: >-
      A security review flags a pod carrying a non-expiring, auto-generated
      Secret-based ServiceAccount token. What is the modern, correct token
      delivery, and why is it safer?
    options:
      - "Base64-encode the Secret token so it is encrypted"
      - "Use a bound, projected ServiceAccount token (TokenRequest API): audience-scoped, time-limited, kubelet-rotated, and bound to the pod lifecycle"
      - "Store the token in a ConfigMap instead of a Secret"
      - "Grant the pod cluster-admin so it does not need a token"
    answer: [1]
    explanation: >-
      Since 1.22 pods should receive bound projected tokens via the TokenRequest
      API — audience-scoped, short-lived, auto-rotated, and invalid once the pod
      is gone. The legacy non-expiring Secret token is exactly the long-lived
      credential you want eliminated, the same value proposition as a managed
      identity over a stored secret.
    docUrl: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#serviceaccount-token-volume-projection"
  - id: q1-12
    objectiveIds: [wi-sa]
    type: single
    stem: >-
      Most pods in a namespace never call the Kubernetes API, yet each mounts a
      ServiceAccount token an attacker could exfiltrate. What is the
      least-privilege baseline?
    options:
      - "Delete the default ServiceAccount from the namespace"
      - "Set `automountServiceAccountToken: false` (on the SA or per pod) and opt in only where a workload actually needs API access"
      - "Give every pod a unique cluster-admin token"
      - "Move all tokens into a shared Secret"
    answer: [1]
    explanation: >-
      Default-deny the token by setting automountServiceAccountToken: false and
      opting in only for workloads that call the API — the Kubernetes echo of
      not attaching a credential a workload does not need. Deleting the default
      SA breaks pods that reference it; cluster-admin is the opposite of least
      privilege.
    docUrl: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/"
  - id: q1-13
    objectiveIds: [wi-oidc]
    type: single
    stem: >-
      You want HashiCorp Vault to trust Kubernetes workloads without any shared
      secret, validating tokens offline. Which cluster capability makes this
      possible?
    options:
      - "The cluster's base64 Secret encoding"
      - "The cluster OIDC issuer: its discovery document and JWKS let a relying party validate a ServiceAccount token's signature offline against `iss`, `sub`, `aud`, and expiry"
      - "A shared kubeconfig copied into Vault"
      - "The pod's IP allowlist"
    answer: [1]
    explanation: >-
      The API server is an OIDC issuer publishing discovery + JWKS, so any
      relying party can validate a projected token cryptographically and offline
      — the open-source form of workload identity federation (no stored secret).
      Vault JWT auth and cloud federation use JWKS; Vault's kubernetes auth
      instead validates online via TokenReview.
    docUrl: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#service-account-issuer-discovery"
  - id: q1-14
    objectiveIds: [wi-oidc]
    type: single
    stem: >-
      A Vault JWT role is configured to trust the cluster issuer but binds on no
      specific subject or audience. Why is this dangerous?
    options:
      - "It is fine; trusting the issuer is sufficient"
      - "Any ServiceAccount token from that issuer would satisfy the role, so any pod could assume the role — federation must bind on the exact `sub` (system:serviceaccount:ns:name) and `aud`"
      - "Vault will reject all tokens without a shared secret"
      - "It only affects tokens older than one hour"
    answer: [1]
    explanation: >-
      Trusting the issuer alone (or a wildcard subject) lets every workload
      assume the role — a real privilege-escalation path and the analogue of a
      federated credential whose subject filter matches too much. Always bind on
      the exact subject and audience.
    docUrl: "https://developer.hashicorp.com/vault/docs/auth/jwt"
  - id: q1-15
    objectiveIds: [wi-spiffe]
    type: single
    stem: >-
      Two services in different clusters must mutually authenticate with mTLS
      using a portable, platform-agnostic identity and no shared secret. Which
      technology fits, and what proves a workload's identity before it gets a
      credential?
    options:
      - "Kubernetes Secret tokens; the API server proves identity"
      - "SPIFFE/SPIRE: each workload gets a SPIFFE ID in a short-lived SVID; the SPIRE agent performs node attestation then workload attestation (selectors) before issuing the SVID"
      - "A shared client secret distributed to both services"
      - "An NGINX basic-auth password"
    answer: [1]
    explanation: >-
      SPIFFE defines the identity (SPIFFE ID + SVID) and SPIRE issues/rotates
      SVIDs after node attestation and workload attestation — attestation, not a
      shared secret, is the trust root. This is the mTLS service-identity
      substrate a mesh uses, the closest analogue to managed identities for
      services generalized across platforms.
    docUrl: "https://spiffe.io/docs/latest/spiffe-about/overview/"
  - id: q1-16
    objectiveIds: [pam-jit]
    type: single
    stem: >-
      Security wants to eliminate standing SSH keys on production hosts and make
      privileged access time-bound. Using Teleport, which mechanism enforces the
      just-in-time window?
    options:
      - "A shared bastion host with a permanent admin key"
      - "Short-lived certificates issued at `tsh login` with a role `max_session_ttl`; access ends automatically when the certificate expires, and the resources are only reachable through the proxy"
      - "A static kubeconfig distributed to each engineer"
      - "A firewall rule that opens SSH during business hours"
    answer: [1]
    explanation: >-
      Teleport is an identity-aware proxy issuing short-lived certs whose TTL is
      the JIT window — access dies on expiry, not on someone remembering to
      revoke it (the PIM activation-window analogue). The property depends on the
      hosts being reachable only through the proxy; a leftover direct SSH path
      defeats it.
    docUrl: "https://goteleport.com/docs/admin-guides/access-controls/guides/role-templates/"
  - id: q1-17
    objectiveIds: [pam-session]
    type: single
    stem: >-
      You must ensure privileged-session evidence survives even if the target
      host is fully compromised, and that recordings cannot be deleted before
      they are stored. Which Teleport setting is correct?
    options:
      - "session_recording: node — record on the target host"
      - "session_recording: proxy-sync — record at the proxy (off the administered host) and stream directly to storage"
      - "Disable recording to reduce attack surface"
      - "Rely only on the structured audit events; recordings are unnecessary"
    answer: [1]
    explanation: >-
      Proxy-side recording keeps the evidence off the host being administered,
      so a compromised target cannot tamper with it; the -sync variant streams
      straight to storage with no local buffer to delete first. Node recording is
      cheaper but tamperable. Audit events (structured who/what) are complementary
      but are not the replayable session.
    docUrl: "https://goteleport.com/docs/reference/architecture/session-recording/"
  - id: q1-18
    objectiveIds: [pam-approval]
    type: single
    stem: >-
      An engineer holds a baseline Teleport role that is allowed to *request*
      the `db-admin` role but carries none of its permissions. During an
      incident they run `tsh request create --roles=db-admin`. What is true
      until a reviewer approves, and what enforces separation of duties?
    options:
      - "They already have db-admin; the request is only for logging"
      - "They have no db-admin permissions until an approver acts; the reviewer must hold review authority (review_requests.roles), which is separate from the request permission so users cannot approve their own escalation"
      - "The request auto-approves after 5 minutes"
      - "Approval grants permanent db-admin"
    answer: [1]
    explanation: >-
      A requestable role is eligible-not-active — it grants nothing until an
      approved request re-issues the certificate with the role for a bounded
      window (the PIM eligible+approval model). Request and review are distinct
      role permissions, enforcing separation of duties; approval is time-boxed
      and audited, never permanent.
    docUrl: "https://goteleport.com/docs/admin-guides/access-controls/access-requests/"
  - id: q1-19
    objectiveIds: [rbac-roles]
    type: single
    stem: >-
      A ServiceAccount in `oss500-apps` unexpectedly can read secrets in *every*
      namespace, though you only wrote one namespaced Role for it. What most
      likely happened?
    options:
      - "Roles are cluster-wide by default"
      - "A ClusterRole granting secret read was attached with a ClusterRoleBinding (cluster-wide) instead of a namespaced RoleBinding — the binding, not the role, sets the scope"
      - "Kubernetes RBAC has an implicit allow-all rule"
      - "The Role inherited permissions from the default ServiceAccount"
    answer: [1]
    explanation: >-
      Scope is decided by the binding: a ClusterRole bound by a
      ClusterRoleBinding applies cluster-wide, whereas a RoleBinding would limit
      it to one namespace. This is the classic 'why can this subject act
      everywhere' bug and the direct parallel of choosing an Azure
      role-assignment scope.
    docUrl: "https://kubernetes.io/docs/reference/access-authn-authz/rbac/"
  - id: q1-20
    objectiveIds: [rbac-roles, rbac-least]
    type: single
    stem: >-
      You need a subject to read pods in exactly one namespace and nothing else.
      Which is the least-privilege construction?
    options:
      - "Bind the built-in `view` ClusterRole with a ClusterRoleBinding"
      - "Create a namespaced Role with get/list/watch on pods and attach it with a RoleBinding in that namespace"
      - "Grant `edit` in the namespace"
      - "Add a deny rule for all other namespaces"
    answer: [1]
    explanation: >-
      Least privilege means narrow verbs, narrow resources, and narrow scope: a
      namespaced Role (get/list/watch on pods) bound by a RoleBinding in the one
      namespace. A ClusterRoleBinding would grant cluster-wide read; `edit` is
      too broad; and RBAC has no deny rules — you restrict by not granting.
    docUrl: "https://kubernetes.io/docs/concepts/security/rbac-good-practices/"
  - id: q1-21
    objectiveIds: [rbac-least]
    type: single
    stem: >-
      A namespace contains a highly privileged ServiceAccount. An auditor warns
      that a developer with only `create` on pods in that namespace can
      effectively escalate. How?
    options:
      - "They cannot; create on pods is harmless"
      - "A pod can be scheduled with any ServiceAccount in the namespace and mount its token, so 'create pods' implicitly grants that privileged SA's powers"
      - "Creating a pod grants cluster-admin automatically"
      - "The developer would need the impersonate verb as well"
    answer: [1]
    explanation: >-
      Because a pod can run as any SA in its namespace and mount that SA's
      token, the ability to create pods implicitly confers the powers of the
      most privileged SA available — an escalation path. Keep privileged
      ServiceAccounts out of namespaces where many subjects can create pods.
    docUrl: "https://kubernetes.io/docs/concepts/security/rbac-good-practices/"
  - id: q1-22
    objectiveIds: [rbac-least]
    type: multi
    stem: >-
      Which Kubernetes RBAC verbs let a subject exceed its own nominal
      permissions and should be granted only very deliberately? (Select two)
    options:
      - "get"
      - "impersonate"
      - "escalate"
      - "watch"
    answer: [1, 2]
    explanation: >-
      `impersonate` lets a subject act as any user/group/SA (kubectl --as),
      bypassing its own limits, and `escalate`/`bind` on roles let a subject
      grant itself permissions it does not hold. get/watch are ordinary read
      verbs. These escalation primitives are the usual answer to 'user has role
      X but can become admin.'
    docUrl: "https://kubernetes.io/docs/reference/access-authn-authz/rbac/#privilege-escalation-prevention-and-bootstrapping"
  - id: q1-23
    objectiveIds: [rbac-audit]
    type: single
    stem: >-
      During an access review you must answer 'who can read Secrets in the
      oss500-apps namespace?' across many Roles and bindings. Which is the most
      direct approach?
    options:
      - "Read every RoleBinding YAML by hand and guess the union"
      - "Run `kubectl who-can list secrets -n oss500-apps` (or `rbac-tool who-can`) — the forward query that computes the effective set of subjects"
      - "Delete all bindings and re-add the ones you remember"
      - "Check the Deny rules for Secrets"
    answer: [1]
    explanation: >-
      Because RBAC is additive and spread across objects, effective permissions
      are the union of all bound roles; who-can tooling computes the forward
      answer ('who can do X') directly — the access-review analogue. There are
      no deny rules to check, and manual guessing misses aggregated grants.
    docUrl: "https://github.com/aquasecurity/kubectl-who-can"
  - id: q1-24
    objectiveIds: [gov-gatekeeper]
    type: single
    stem: >-
      With OPA Gatekeeper you wrote a ConstraintTemplate requiring an `owner`
      label but no resources are being blocked. What is missing, and how does
      this map to Azure Policy?
    options:
      - "Nothing — templates enforce on their own"
      - "A Constraint (an instance of the template) that sets the match scope and `enforcementAction: deny` must exist; the template is the policy definition and the Constraint is the scoped assignment — the Azure Policy definition vs assignment split"
      - "You must switch Gatekeeper to Kyverno mode"
      - "The template needs `enforcementAction: audit` to deny"
    answer: [1]
    explanation: >-
      Gatekeeper separates the ConstraintTemplate (definition + Rego) from the
      Constraint (which sets where it applies and how hard). A template with no
      Constraint enforces nothing — the same definition-vs-assignment model as
      Azure Policy (which for AKS is built on Gatekeeper). deny blocks; audit
      only reports.
    docUrl: "https://open-policy-agent.github.io/gatekeeper/website/docs/howto/"
  - id: q1-25
    objectiveIds: [gov-kyverno]
    type: single
    stem: >-
      You want pods that omit a securityContext to be automatically given
      `runAsNonRoot: true` at admission rather than simply rejected. Which
      Kyverno rule type does this, and what Azure Policy effect is it like?
    options:
      - "A validate rule with validationFailureAction: Enforce"
      - "A mutate rule that patches the resource on admission — the analogue of an Azure Policy Modify effect (remediation, not just detection)"
      - "A generate rule that creates a new namespace"
      - "A verifyImages rule checking cosign signatures"
    answer: [1]
    explanation: >-
      Kyverno mutate rules patch resources as they are admitted (inject a secure
      default), the remediation capability that maps to Azure Policy's Modify
      effect. validate only allows/denies, generate provisions companion
      resources, and verifyImages enforces signatures.
    docUrl: "https://kyverno.io/docs/writing-policies/mutate/"
  - id: q1-26
    objectiveIds: [gov-compliance]
    type: single
    stem: >-
      Leadership wants a periodic score of how the cluster measures up to the
      NSA-CISA Kubernetes hardening guidance, with per-control pass/fail and
      remediation. Which tool and what is the key caveat?
    options:
      - "Kyverno in Enforce mode — it produces a compliance certificate"
      - "Kubescape `scan framework nsa` — it measures and scores posture against the framework (a Defender secure-score analogue); a passing score is technical-control coverage, not a formal certification"
      - "OPA Gatekeeper audit — it blocks non-compliant frameworks"
      - "kubectl auth can-i --list"
    answer: [1]
    explanation: >-
      Kubescape scores the estate against frameworks like NSA-CISA/CIS/MITRE
      with severity-weighted controls — the secure-score/regulatory-compliance
      analogue, and detective (measuring) rather than preventive (admission
      enforcement). As with Defender's dashboard, a passing score is not the
      same as being certified compliant.
    docUrl: "https://kubescape.io/docs/frameworks-and-controls/"
  - id: q1-27
    objectiveIds: [gov-iac]
    type: single
    stem: >-
      Your team wants security controls (namespaces, RBAC, admission policies)
      to be reviewable before they go live and catchable in CI before deploy.
      Which practices deliver this 'security via IaC' outcome?
    options:
      - "Configure everything by clicking through a dashboard so it is quick"
      - "Keep controls as version-controlled Helm/manifests, use `helm template` to render-and-review before apply, and shift-left scan the manifests in CI with Kubescape/Trivy"
      - "Apply controls imperatively with one-off kubectl edit commands"
      - "Store the manifests only on the operator's laptop"
    answer: [1]
    explanation: >-
      IaC makes controls reviewable (diff/`helm template`), reproducible,
      versioned, and testable, and shift-left scanning catches misconfigurations
      before deployment — the open-source form of scanning IaC/DevOps templates.
      Policy-as-code (Gatekeeper/Kyverno objects in git) is itself IaC.
    docUrl: "https://kubescape.io/docs/scanning/scan-yaml/"
  - id: q1-28
    objectiveIds: [gov-gatekeeper, gov-kyverno]
    type: single
    stem: >-
      You must introduce a new admission policy across a busy cluster without
      breaking existing deployments on day one, then enforce it later. What is
      the correct rollout for Gatekeeper and Kyverno respectively?
    options:
      - "Start with deny/Enforce immediately to be safe"
      - "Start with Gatekeeper `enforcementAction: dryrun` (or warn) and Kyverno `validationFailureAction: Audit` to observe violations, then switch to deny/Enforce — the Azure Policy Audit-then-Deny pattern"
      - "Delete non-compliant resources first, then add the policy"
      - "Use compliance scanning instead of any admission policy"
    answer: [1]
    explanation: >-
