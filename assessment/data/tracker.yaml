            sc500: Defender for Cloud posture
            lab: hands-on
          - id: vuln-cis
            text: "Audit nodes and cluster against CIS benchmarks"
            oss: kube-bench / Kubescape
            sc500: CIS benchmark auditing
            lab: hands-on
          - id: vuln-compliance
            text: "Produce compliance and secure-score style reports"
            oss: Kubescape frameworks
            sc500: Secure score / regulatory compliance
            lab: hands-on
          - id: vuln-remediate
            text: "Prioritize and remediate findings across images and infrastructure"
            oss: Trivy + Kubescape
            sc500: Defender recommendations
            lab: hands-on
