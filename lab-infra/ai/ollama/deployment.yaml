# Ollama — local model server (ai-access, ai-rag).
# ai-access: ClusterIP only + NetworkPolicy — the model port (:11434) is NEVER exposed.
# Ollama has no built-in authentication, so it MUST sit behind the gateway/guardrails.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: oss500-apps
  labels: { app.kubernetes.io/part-of: oss500 }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 8Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: oss500-apps
  labels: { app.kubernetes.io/part-of: oss500, app: ollama }
spec:
  replicas: 1
  selector: { matchLabels: { app: ollama } }
  template:
    metadata:
      labels: { app: ollama, app.kubernetes.io/part-of: oss500 }
    spec:
      # pod-securitycontext: the model server itself runs hardened (non-root, RO FS,
      # dropped caps, seccomp) — AI workloads are still workloads.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports: [{ containerPort: 11434 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          env:
            - { name: OLLAMA_HOST, value: "0.0.0.0:11434" }
            - { name: OLLAMA_MODELS, value: "/models" }
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits:   { cpu: "2",    memory: "6Gi" }
          volumeMounts:
            - { name: models, mountPath: /models }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: models, persistentVolumeClaim: { claimName: ollama-models } }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: oss500-apps
  labels: { app.kubernetes.io/part-of: oss500 }
spec:
  type: ClusterIP          # ai-access: internal only — no ingress, no NodePort
  selector: { app: ollama }
  ports: [{ port: 11434, targetPort: 11434 }]
---
# ai-access: default-deny to the model port; only the gateway + guardrails + Open WebUI
# pods may reach Ollama. Anything else (a random pod, an attacker foothold) cannot.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-restrict
  namespace: oss500-apps
  labels: { app.kubernetes.io/part-of: oss500 }
spec:
  podSelector: { matchLabels: { app: ollama } }
  policyTypes: ["Ingress"]
  ingress:
    # ai-access: ONLY the gateway may reach the model. Open WebUI routes through
    # the gateway (OpenAI-compatible), and NeMo Guardrails run inside the gateway,
    # so the gateway pod is the single legitimate client of Ollama.
    - from:
        - podSelector: { matchLabels: { app: ai-gateway } }
      ports:
        - { protocol: TCP, port: 11434 }
