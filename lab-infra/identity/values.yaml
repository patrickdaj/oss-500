# Keycloak Helm values (bitnami/keycloak) for the OSS-500 identity component.
# Deployed into namespace oss500-identity, which enforces the RESTRICTED Pod
# Security Standard (see lab-infra/shared/namespaces.yaml) — every securityContext
# below exists to satisfy that baseline, so the IdP itself models good pod hardening.
#
# Objectives exercised by this stack: kc-deploy, kc-mfa, kc-ca, kc-clients,
# kc-federation, kc-consent.  Render before applying (gov-iac):
#   helm template keycloak oci://registry-1.docker.io/bitnamicharts/keycloak -f values.yaml

## --- Admin bootstrap (kc-deploy) -------------------------------------------
auth:
  adminUser: admin
  # kc-deploy: the admin password is NOT inlined here. up.sh creates the secret
  # `keycloak-admin` from admin-password.env (gitignored) with key admin-password.
  existingSecret: keycloak-admin
  passwordSecretKey: admin-password

## kc-deploy: dev-mode is acceptable ONLY for the lab. Production Keycloak
## (`kc.sh start`) REQUIRES a fixed hostname and HTTPS, because the hostname is
## baked into every token's `iss` claim and the OIDC discovery document. Flipping
## this to production=true without setting a real hostname/TLS breaks all clients.
production: false
proxy: edge   # ingress terminates TLS in front of Keycloak (lab)

## kc-deploy: public hostname → becomes the OIDC issuer. Reachable via the kind
## ingress at http://keycloak.oss500.local (map it to 127.0.0.1 in /etc/hosts).
## Changing this later invalidates existing tokens/clients — same lesson as
## changing an Entra tenant's federation metadata.
ingress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak.oss500.local
  # TLS omitted for the local lab (proxy: edge). Prod: terminate TLS here.

## --- Pod hardening to satisfy the RESTRICTED Pod Security Standard ----------
## (mirrors pod-securitycontext / pod-psa — the IdP eats its own dog food)
podSecurityContext:
  enabled: true
  fsGroup: 1001
  runAsNonRoot: true            # restricted PSS: never run as root
  seccompProfile:
    type: RuntimeDefault        # restricted PSS: seccomp must be RuntimeDefault/Localhost
containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false   # restricted PSS: no privilege escalation
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]                   # restricted PSS: drop every Linux capability

## Resource limits keep the IdP inside the ~4 core / 16 GB reference host.
resources:
  requests: { cpu: "250m", memory: "512Mi" }
  limits:   { cpu: "1",    memory: "1Gi" }

## Single replica for the lab (no HA cache/Infinispan clustering to reason about).
replicaCount: 1

## kc-deploy: Keycloak needs a real RDBMS for durable state — the bundled H2 dev
## database loses realms/users on restart. Bitnami ships a PostgreSQL subchart.
postgresql:
  enabled: true
  auth:
    username: keycloak
    database: keycloak
    # Subchart generates the postgres password into its own Secret on first install.
  primary:
    persistence:
      enabled: true
      size: 1Gi                 # small — this is a lab
    # Postgres also runs in oss500-identity → must satisfy restricted PSS too.
    podSecurityContext:
      enabled: true
      fsGroup: 1001
      runAsNonRoot: true
      seccompProfile: { type: RuntimeDefault }
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 1001
      allowPrivilegeEscalation: false
      capabilities: { drop: ["ALL"] }

## Everything carries the OSS-500 teardown label:
##   kubectl get all -A -l app.kubernetes.io/part-of=oss500
commonLabels:
  app.kubernetes.io/part-of: oss500

## kc-mfa / kc-federation: WebAuthn (FIDO2 passwordless) needs the relying-party
## ID to equal the public hostname, and brokering needs a reachable issuer — both
## are configured in the realm at lab time (see the lab guides), not chart values.
