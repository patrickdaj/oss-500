# Fabric demo workloads (oss500-apps is PSA "restricted", so these are hardened:
# non-root, all caps dropped, read-only rootfs, seccomp RuntimeDefault).
#
# egress-client  — labelled egress=gateway; the egress gateway SNATs its traffic to
#                  the fixed gateway IP (fab-egress).
# direct-client  — no egress label; egresses with its own node's IP, for contrast.
# fqdn-client    — subject to the FQDN allowlist (fab-fqdn).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-client
  namespace: oss500-apps
  labels: { app.kubernetes.io/part-of: oss500, app: egress-client, egress: gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: egress-client } }
  template:
    metadata:
      labels: { app.kubernetes.io/part-of: oss500, app: egress-client, egress: gateway }
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.11.0
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
            seccompProfile: { type: RuntimeDefault }
---
apiVersion: apps/v1
kind: Deployment
