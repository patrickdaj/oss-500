# The OSS-500 posture dashboard (obs-dashboards), provisioned via the Grafana
# sidecar (label grafana_dashboard=1, per prometheus-values.yaml's
# grafana.sidecar.dashboards). Four panels, one per backend/signal this phase
# stands up, so metrics -> logs -> traces drill-down happens in one pane:
#   1. API-server 5xx rate            (Prometheus: apiserver_request_total)
#   2. Pods using the default SA      (Prometheus: kube_pod_service_account —
#      a real least-privilege posture signal; kube-state-metrics has no
#      "runAsRoot"/securityContext metric to query directly, so this is the
#      genuine equivalent: CIS Kubernetes Benchmark 5.1.5, "default service
#      accounts should not be actively used")
#   3. Denied/failed-auth log rate    (Loki: the demo-authlog.yaml app)
#   4. Trace p95 latency              (Prometheus: traces_spanmetrics_latency,
#      emitted by the otel-collector's spanmetrics connector from real spans —
#      Tempo itself has no native "graph this over time" query)
apiVersion: v1
kind: ConfigMap
metadata:
  name: oss500-grafana-dashboards
  namespace: oss500-monitoring
  labels:
    app.kubernetes.io/part-of: oss500
    grafana_dashboard: "1"
data:
  oss500-posture.json: |
    {
      "title": "OSS-500 Posture",
      "uid": "oss500-posture",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "timezone": "browser",
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "tags": ["oss500", "posture"],
      "panels": [
        {
          "id": 1,
          "title": "API-server 5xx rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(apiserver_request_total{code=~\"5..\"}[5m]))",
              "legendFormat": "5xx/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods using the default ServiceAccount",
          "type": "timeseries",
          "description": "Least-privilege posture proxy for 'pods running as root': kube-state-metrics ships no securityContext/root metric, so this counts pods that never got a dedicated ServiceAccount (CIS Kubernetes Benchmark 5.1.5).",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(kube_pod_service_account{service_account=\"default\"})",
              "legendFormat": "pods on default SA",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Denied/failed-auth log rate",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(rate({namespace=\"oss500-apps\", app=\"authlog\"} |= \"Failed password\" [1m]))",
              "legendFormat": "failed logins/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Trace p95 latency",
          "type": "timeseries",
          "description": "traced-frontend -> traced-backend span duration, derived from real spans by the otel-collector's spanmetrics connector (traces_spanmetrics_latency).",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket[5m])) by (le, span_name))",
              "legendFormat": "{{span_name}} p95",
              "refId": "A"
            }
          ]
        }
      ]
    }
