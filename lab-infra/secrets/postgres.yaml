# Postgres backend for the Vault dynamic-secrets lab (vault-dynamic).
# Vault connects as the admin role `vaultadmin` and mints short-lived roles on
# demand; the lab proves a dynamic credential works then dies after lease revoke.
# Matches labs/d2-vault-dynamic-secrets.md Part C: host postgres.oss500-secrets,
# db appdb, admin vaultadmin/vaultadminpw. Ephemeral (emptyDir) — lab-only.
#
# NOTE: credentials here are lab-only and intentionally weak; this is a local,
# disposable Postgres with no data of value. Never model a real DB this way.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: oss500-secrets
  labels:
    app.kubernetes.io/part-of: oss500
data:
  # A demo table so `GRANT SELECT ON ALL TABLES IN SCHEMA public` (the Vault role's
  # creation_statements) grants something real, and `SELECT` returns rows.
  init.sql: |
    CREATE TABLE IF NOT EXISTS widgets (id serial PRIMARY KEY, name text);
    INSERT INTO widgets (name) VALUES ('alpha'), ('bravo');
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: oss500-secrets
  labels:
    app: postgres
    app.kubernetes.io/part-of: oss500
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: oss500
    spec:
      securityContext:
        # restricted-PSA compliant (oss500-secrets warns on restricted).
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: vaultadmin           # the admin role Vault's database/config/appdb uses
            - name: POSTGRES_PASSWORD
              value: vaultadminpw          # rotated away by Part D `rotate-root`
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "vaultadmin", "-d", "appdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
        - name: initdb
          configMap:
            name: postgres-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: oss500-secrets
  labels:
    app: postgres
    app.kubernetes.io/part-of: oss500
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
# A psql-capable client the lab uses to prove the dynamic credential works then
# fails after revocation: `kubectl -n oss500-secrets exec deploy/psql-client -- \
#   env PGPASSWORD=<pw> psql -h postgres.oss500-secrets -U <user> -d appdb -c 'SELECT 1;'`
apiVersion: apps/v1
kind: Deployment
metadata:
  name: psql-client
  namespace: oss500-secrets
  labels:
    app: psql-client
    app.kubernetes.io/part-of: oss500
spec:
  replicas: 1
  selector:
    matchLabels:
      app: psql-client
  template:
    metadata:
      labels:
        app: psql-client
        app.kubernetes.io/part-of: oss500
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: postgres:16-alpine
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
