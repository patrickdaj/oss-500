# hashicorp/vault Helm values for OSS-500 (SC-500 ~ Azure Key Vault).
# Chart: hashicorp/vault  (https://helm.releases.hashicorp.com)
# Deploys into oss500-secrets. See README.md and up.sh/configure.sh for setup.
#
# vault-deploy: SINGLE-NODE INTEGRATED STORAGE (RAFT). Unlike dev mode, this
# server boots SEALED and must be initialised + unsealed — which up.sh does,
# writing the Shamir unseal keys + root token to the gitignored .vault-init.json.
# This makes the lab's Part A (`vault status` -> Storage Type raft, Sealed;
# `vault operator raft list-peers`; the Shamir seal/unseal cycle) real, and
# persists secrets across restarts (a dev server wipes them). One replica keeps
# it inside the reference host; a real deploy runs 3+ replicas with auto-unseal.
global:
  enabled: true

server:
  # Integrated storage (Raft) — no external Consul. Single node for the lab.
  ha:
    enabled: true
    replicas: 1
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        listener "tcp" {
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable     = 1        # vault-deploy: TLS terminated at ingress in real life
        }
        storage "raft" {
          path = "/vault/data"
        }
        service_registration "kubernetes" {}
        # vault-deploy: a real deploy adds a seal "..." { } auto-unseal block so
        # operators never handle Shamir keys by hand. Omitted here so the lab can
        # SEE the Shamir unseal flow (Part A).

  # PVC for the Raft log so secrets survive a pod restart.
  dataStorage:
    enabled: true
    size: 1Gi

  # Resource caps keep the lab inside the reference host.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # vault-audit: mount an emptyDir for the file audit device target.
  # (In the lab, `vault audit enable file file_path=/vault/audit/audit.log`.)
  volumes:
    - name: audit
      emptyDir: {}
  volumeMounts:
    - name: audit
      mountPath: /vault/audit
      readOnly: false

# vault-k8s: the Agent Injector mutating webhook rewrites pods that carry
# vault.hashicorp.com/agent-inject annotations, adding an init + sidecar agent
# that authenticates with the pod's ServiceAccount and writes rendered secrets
# to a shared in-memory volume (/vault/secrets). No k8s Secret object is created.
injector:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# vault-k8s (alternative delivery): the Secrets Store CSI driver mounts Vault
# secrets as a tmpfs volume via a SecretProviderClass. Enabling this in the
# chart registers Vault as a CSI provider; the driver itself is installed by up.sh.
csi:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

ui:
  enabled: true          # vault-deploy: web UI (port-forward 8200 to reach it)
  serviceType: ClusterIP
