# hashicorp/vault Helm values for OSS-500 (SC-500 ~ Azure Key Vault).
# Chart: hashicorp/vault  (https://helm.releases.hashicorp.com)
# Deploys into oss500-secrets. See README.md and configure.sh for post-install setup.
global:
  enabled: true
  # All chart objects inherit the OSS-500 teardown label.
  # (set again per-workload below where the chart allows extraLabels)

server:
  # vault-deploy: DEV MODE — lab-only. A dev server auto-initialises and
  # auto-unseals with an in-memory store and a fixed root token ("root").
  # It is EPHEMERAL: every restart wipes all secrets. Great for a laptop lab,
  # NEVER for anything real.
  dev:
    enabled: true
    devRootToken: "root"        # vault-access: well-known root token, lab only

  # vault-deploy (REAL DEPLOY, kept here as reference — do NOT enable with dev):
  # A production Vault uses HA with the integrated Raft storage backend and an
  # auto-unseal seal so operators never handle Shamir unseal keys by hand.
  #
  # dev:
  #   enabled: false
  # ha:
  #   enabled: true
  #   replicas: 3
  #   raft:
  #     enabled: true            # vault-deploy: integrated storage (no external Consul)
  #     setNodeId: true
  #     config: |
  #       ui = true
  #       listener "tcp" {
  #         address     = "[::]:8200"
  #         tls_disable = 0       # vault-deploy: TLS on the listener in real life
  #       }
  #       storage "raft" {
  #         path = "/vault/data"
  #       }
  #       # vault-deploy: auto-unseal via a cloud KMS or Transit seal so unseal
  #       # keys never sit on an operator's laptop. Example (Transit seal):
  #       # seal "transit" {
  #       #   address = "https://vault-seal:8200"
  #       #   key_name = "autounseal"
  #       #   mount_path = "transit/"
  #       # }
  # dataStorage:
  #   enabled: true              # vault-deploy: PVC for Raft data
  #   size: 2Gi

  # Resource caps keep the lab inside the reference host.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  # vault-audit: mount an emptyDir for the file audit device target.
  # (In the lab, `configure.sh` runs `vault audit enable file
  #  file_path=/vault/audit/audit.log` against this path.)
  volumes:
    - name: audit
      emptyDir: {}
  volumeMounts:
    - name: audit
      mountPath: /vault/audit
      readOnly: false

# vault-k8s: the Agent Injector mutating webhook rewrites pods that carry
# vault.hashicorp.com/agent-inject annotations, adding an init + sidecar agent
# that authenticates with the pod's ServiceAccount and writes rendered secrets
# to a shared in-memory volume (/vault/secrets). No k8s Secret object is created.
injector:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# vault-k8s (alternative delivery): the Secrets Store CSI driver mounts Vault
# secrets as a tmpfs volume via a SecretProviderClass. Enabling this in the
# chart registers Vault as a CSI provider; the driver itself is installed by up.sh.
csi:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

ui:
  enabled: true          # vault-deploy: web UI (port-forward 8200 to reach it)
  serviceType: ClusterIP
