# Shared namespaces and labels for OSS-500 labs.
# Every lab resource carries the label  app.kubernetes.io/part-of: oss500
# so a single query finds everything for teardown:
#   kubectl get all -A -l app.kubernetes.io/part-of=oss500
# Apply:  kubectl apply -f lab-infra/shared/namespaces.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-identity        # Keycloak, PAM (d1)
  labels:
    app.kubernetes.io/part-of: oss500
    # pod-psa: enforce the restricted Pod Security Standard at the namespace edge.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-secrets         # Vault, cert-manager (d2)
  labels:
    app.kubernetes.io/part-of: oss500
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-apps            # demo workloads used across labs
  labels:
    app.kubernetes.io/part-of: oss500
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-demo            # admission/runtime demo pods for d1-governance-policy,
                                # d3-pod-security, d3-runtime-detection, d3-supply-chain
  labels:
    app.kubernetes.io/part-of: oss500
    # Deliberately NOT restricted. Built-in PodSecurity admission (PSA) is evaluated
    # before validating/mutating webhooks and short-circuits the request, so a
    # restricted-labeled namespace would reject these labs' demo pods on PSS grounds
    # before Kyverno, Falco, or cosign verification ever gets a look — pre-empting the
    # control each lab exists to prove. Real workloads still belong in oss500-apps.
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-security        # Falco, Tetragon, Kyverno, Gatekeeper, Kubescape (d1/d3)
  labels:
    app.kubernetes.io/part-of: oss500
    # Security tooling legitimately needs privileges (host mounts, eBPF), so this
    # namespace is privileged by design — the exception that proves the rule.
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-monitoring      # Prometheus, Grafana, Loki, Tempo (d4)
  labels:
    app.kubernetes.io/part-of: oss500
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: oss500-ztna            # Pomerium identity-aware proxy (d1 ztna)
  labels:
    app.kubernetes.io/part-of: oss500
    # Pomerium's proxy pods run under baseline (not restricted): the chart's
    # containers want a little latitude — the same latitude Vault/cert-manager get.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
