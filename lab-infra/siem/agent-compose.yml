# A Wazuh agent to onboard for the lab (siem-collect).
# Enrolls with the manager, ships auth.log + FIM + SCA. Run after the main stack:
#   docker compose -p oss500-siem -f agent-compose.yml up -d
#
# siem-collect: this image has no sshd and no ssh client, so brute-force
# telemetry is generated with crafted log lines, not real ssh attempts — see
# labs/d4-siem-wazuh.md Part B for the exact file/line format the built-in
# sshd decoder expects.
name: oss500

services:
  wazuh.agent:
    image: wazuh/wazuh-agent:${WAZUH_VERSION:-4.9.2}
    hostname: wazuh.agent
    restart: always
    environment:
      # siem-collect: enroll to the manager (1515) and stream events (1514).
      WAZUH_MANAGER: wazuh.manager
      WAZUH_AGENT_NAME: oss500-agent
      WAZUH_REGISTRATION_SERVER: wazuh.manager
    # siem-response: firewall-drop shells out to iptables inside the container,
    # which needs NET_ADMIN (rule manipulation) and NET_RAW (raw sockets) — an
    # unprivileged container has neither by default, so the active-response
    # command exists but silently fails without this.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Join the same compose network as the manager stack.
    networks:
      - default
    volumes:
      - wazuh_agent_var:/var/ossec

networks:
  default:
    # Must match the network the main stack creates. It is brought up with
    # `docker compose -p oss500-siem`, so the project (and its default network)
    # is oss500-siem_default — the `-p` flag overrides this file's `name:`.
    name: oss500-siem_default
    external: true

volumes:
  wazuh_agent_var:
