<!--
  OSS-500 Wazuh manager configuration. Mounted to /wazuh-config-mount/etc/ossec.conf,
  which the manager's entrypoint installs as the running /var/ossec/etc/ossec.conf —
  this file IS the manager's whole config, not an excerpt layered on top of a
  built-in default. Earlier revisions shipped only the <remote>/<command>/
  <active-response> blocks; without a <ruleset> block the manager never loads
  ANY decoder or rule (built-in or custom), so telemetry arrives but nothing
  ever fires — zero alerts, zero errors, and no obvious reason why.
-->
<ossec_config>

  <!-- siem-deploy: baseline manager behavior — write alerts as JSON (what the
       indexer/Filebeat pipeline expects) as well as plaintext. -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
  </alerts>

  <!-- siem-detect: load the built-in decoder/rule set AND the custom rules
       (custom-rules.xml, mounted at etc/rules/local_rules.xml) on top of it.
       Omitting this block is why decoders/rules silently never load. -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/security-eventchannel</list>

    <!-- User-defined ruleset: local_rules.xml (custom-rules.xml's mount target). -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- Ingest agent events + syslog (siem-collect). -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
  </remote>
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>172.16.0.0/12</allowed-ips>
  </remote>

  <!-- siem-response: the command an agent runs. firewall-drop adds the attacker's
       source IP to the host firewall (iptables/ipset/PF). Ships with Wazuh. -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- siem-response: conditional SOAR automation. When rule 100100 (SSH brute-force,
       level 10) fires, drop the source IP on the reporting agent for 600s, then
       AUTO-REVERT (timeout). Guardrails: high-confidence rule only, time-bounded,
       and you would allow-list critical infra to avoid a spoofed-source self-DoS. -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100100</rules_id>
    <timeout>600</timeout>
  </active-response>

</ossec_config>
