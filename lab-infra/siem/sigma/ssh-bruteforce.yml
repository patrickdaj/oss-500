# Portable Sigma detection (siem-detect) — write once, convert to any backend.
#   sigma convert -t opensearch_lucene ssh-bruteforce.yml      # -> OpenSearch DSL/query (current pysigma-backend-opensearch's target id, not "opensearch")
#   sigma convert -t kusto ssh-bruteforce.yml                  # -> Sentinel KQL analytics rule
# Sigma is a FORMAT, not an engine: it detects nothing until converted and deployed.
title: SSH Brute Force - Repeated Failed Logins
id: 9f6a2b1c-3d4e-4f5a-8b7c-0d1e2f3a4b5c
status: experimental
description: Detects repeated SSH authentication failures from a single source, indicating brute-force.
author: OSS-500
date: 2026/04/26
references:
  - https://attack.mitre.org/techniques/T1110/
logsource:
  product: linux
  service: sshd
detection:
  # A plain keyword selection — a bare list under a detection identifier is
  # Sigma's keyword-matching form. Kept -p-less/aggregation-free deliberately:
  # the v1-style `condition: selection | count() by field > N` + top-level
  # `timeframe` this used to carry is legacy aggregation syntax current pySigma
  # backends don't convert (that logic now belongs in a separate Sigma
  # correlation rule). The count-based threshold that turns repeated failures
  # into a brute-force verdict is enforced natively instead, by Wazuh rule
  # 100100 (custom-rules.xml) — Sigma expresses WHICH events matter, the
  # backend rule expresses the frequency/timeframe threshold on top.
  selection:
    - 'Failed password'
    - 'authentication failure'
  condition: selection
falsepositives:
  - Legitimate users repeatedly mistyping passwords
  - Vulnerability scanners
level: high
tags:
  - attack.credential_access
  - attack.t1110          # MITRE ATT&CK: Brute Force
  - attack.t1110.001      # Password Guessing
